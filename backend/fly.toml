# Fly.io configuration — Field Sales CRM backend
# Docs: https://fly.io/docs/reference/configuration/

app = "field-sales-crm"
primary_region = "ewr"   # Newark, NJ — closest to New York

[build]

[env]
  PORT = "8000"

# FastAPI — public API
[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# Streamlit Dashboard — owner access
[[services]]
  internal_port = 8501
  protocol = "tcp"

  [[services.ports]]
    port = 8501
    handlers = ["tls", "http"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume — stores SQLite DB + audio files
[mounts]
  source = "crm_data"
  destination = "/data"
